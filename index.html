<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <title>VoiceCue — 음성 추적 텔레프롬프터</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #121722;
      --panel-2: #171e2b;
      --text: #f3f6fb;
      --muted: #9da9bc;
      --line: rgba(255,255,255,.10);
      --accent: #73e2a7;
      --accent-2: #6eb4ff;
      --danger: #ff7a90;
      --shadow: 0 18px 55px rgba(0,0,0,.32);
      --font-size: 42px;
      --line-height: 1.75;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(110,180,255,.12), transparent 26rem),
        radial-gradient(circle at 88% 8%, rgba(115,226,167,.10), transparent 24rem),
        var(--bg);
      font-family: Pretendard, "Noto Sans KR", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    button, input, textarea, select { font: inherit; }
    button { color: inherit; }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
    }

    .topbar {
      position: relative;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(11,13,18,.82);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: max-content;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: #06100b;
      background: linear-gradient(135deg, var(--accent), #b7ffd5);
      box-shadow: 0 8px 24px rgba(115,226,167,.22);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }

    .btn, .control {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(255,255,255,.055);
      box-shadow: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(255,255,255,.22); }
    .btn:active { transform: translateY(0); }
    .btn.primary {
      color: #05120b;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), #b6ffd4);
      font-weight: 800;
    }
    .btn.danger {
      background: rgba(255,122,144,.12);
      border-color: rgba(255,122,144,.28);
      color: #ffc3cd;
    }
    .btn.icon {
      width: 40px;
      padding: 0;
      font-size: 18px;
    }

    .control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .control input[type="range"] { width: 92px; accent-color: var(--accent); }
    .control select {
      color: var(--text);
      border: 0;
      outline: 0;
      background: transparent;
    }

    .status {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: max-content;
      color: var(--muted);
      font-size: 13px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #687386;
      box-shadow: 0 0 0 4px rgba(104,115,134,.12);
    }
    .dot.live {
      background: var(--danger);
      box-shadow: 0 0 0 5px rgba(255,122,144,.13);
      animation: pulse 1.15s infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(.92); opacity: .8; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(290px, 34%) 1fr;
    }

    .editor-panel {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      min-height: 0;
      border-right: 1px solid var(--line);
      background: rgba(18,23,34,.84);
      backdrop-filter: blur(14px);
    }

    .panel-head, .panel-foot {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }
    .panel-foot {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }
    .panel-title {
      font-weight: 800;
      margin-bottom: 4px;
    }
    .panel-desc {
      color: var(--muted);
      font-size: 13px;
    }

    .editor-wrap {
      min-height: 0;
      padding: 14px;
    }

    textarea {
      width: 100%;
      height: 100%;
      resize: none;
      padding: 16px;
      color: var(--text);
      outline: none;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(7,10,15,.72);
      line-height: 1.7;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    textarea:focus { border-color: rgba(115,226,167,.48); }

    .prompter-shell {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .prompter {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      scroll-behavior: smooth;
      padding: 34vh clamp(26px, 7vw, 110px) 48vh;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.18) transparent;
    }

    .guide {
      position: absolute;
      z-index: 4;
      left: 18px;
      right: 18px;
      top: 43%;
      height: 0;
      border-top: 1px dashed rgba(115,226,167,.35);
      pointer-events: none;
    }
    .guide::before {
      content: "";
      position: absolute;
      left: -1px;
      top: -5px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(115,226,167,.55);
    }

    .script {
      max-width: 1000px;
      margin: 0 auto;
      font-size: var(--font-size);
      line-height: var(--line-height);
      font-weight: 680;
      letter-spacing: -.025em;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .word {
      display: inline;
      padding: .04em .045em;
      border-radius: .22em;
      color: rgba(243,246,251,.91);
      transition: color .18s ease, background .18s ease, opacity .18s ease, filter .18s ease;
    }
    .word.past { color: rgba(157,169,188,.34); }
    .word.near {
      color: rgba(220,255,235,.82);
      text-decoration: underline;
      text-decoration-color: rgba(115,226,167,.24);
      text-underline-offset: .18em;
    }
    .word.current {
      --cue-progress: 0%;
      color: #04110a;
      background:
        linear-gradient(
          90deg,
          var(--accent) 0%,
          #c8ffdd var(--cue-progress),
          rgba(115,226,167,.22) var(--cue-progress),
          rgba(115,226,167,.10) 100%
        );
      box-shadow: 0 .12em .45em rgba(115,226,167,.20);
    }
    .line-break { display: block; height: .6em; }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 50vh;
      text-align: center;
      color: var(--muted);
    }
    .empty-state strong {
      display: block;
      color: var(--text);
      font-size: 22px;
      margin-bottom: 8px;
    }

    .floating {
      position: absolute;
      z-index: 8;
      right: 18px;
      bottom: 18px;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .transcript {
      position: absolute;
      z-index: 8;
      left: 22px;
      right: 22px;
      bottom: 18px;
      max-width: 720px;
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(7,10,15,.76);
      backdrop-filter: blur(14px);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      opacity: 0;
      transform: translateY(7px);
      transition: opacity .2s ease, transform .2s ease;
    }
    .transcript.show { opacity: 1; transform: translateY(0); }
    .transcript b { color: var(--accent); }

    .progress {
      position: absolute;
      z-index: 12;
      left: 0;
      right: 0;
      top: 0;
      height: 3px;
      background: rgba(255,255,255,.06);
    }
    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      transition: width .25s ease;
    }

    .toast {
      position: fixed;
      z-index: 100;
      left: 50%;
      bottom: 24px;
      transform: translate(-50%, 20px);
      padding: 11px 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(9,12,18,.94);
      color: var(--text);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .mobile-editor-toggle { display: none; }

    body.focus-mode .editor-panel,
    body.focus-mode .brand,
    body.focus-mode .toolbar .hide-focus {
      display: none;
    }
    body.focus-mode .workspace { grid-template-columns: 1fr; }
    body.focus-mode .topbar { justify-content: center; }
    body.focus-mode .toolbar { flex: 0 1 auto; }

    @media (max-width: 880px) {
      .workspace { grid-template-columns: 1fr; }
      .editor-panel {
        position: absolute;
        inset: 61px 0 0 0;
        transform: translateX(-104%);
        transition: transform .24s ease;
        border-right: 0;
      }
      body.editor-open .editor-panel { transform: translateX(0); }
      .mobile-editor-toggle { display: inline-flex; }
      .status .status-text { display: none; }
      .script { font-size: min(var(--font-size), 9vw); }
      .prompter { padding-left: 7vw; padding-right: 7vw; }
    }

    @media (max-width: 580px) {
      .topbar { padding: 10px; }
      .brand-name { display: none; }
      .control span { display: none; }
      .control input[type="range"] { width: 74px; }
      .btn { padding: 0 11px; }
      .guide { left: 8px; right: 8px; }
      .transcript { left: 12px; right: 12px; bottom: 68px; }
      .floating { right: 12px; bottom: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">V</div>
        <span class="brand-name">VoiceCue</span>
      </div>

      <div class="toolbar">
        <button class="btn mobile-editor-toggle" id="mobileEditorBtn" title="대본 편집">✎</button>
        <button class="btn primary" id="startBtn">● 0.1초 음성 추적</button>
        <button class="btn danger" id="stopBtn" hidden>■ 정지</button>
        <button class="btn hide-focus" id="applyBtn">대본 적용</button>
        <button class="btn hide-focus" id="fileBtn">파일 열기</button>
        <input id="fileInput" type="file" accept=".txt,.md,text/plain,text/markdown" hidden />

        <label class="control hide-focus" title="글자 크기">
          <span>글자</span>
          <input id="fontSize" type="range" min="26" max="72" value="42" />
        </label>

        <label class="control hide-focus" title="음성 인식 일치 민감도">
          <span>민감도</span>
          <input id="sensitivity" type="range" min="35" max="85" value="55" />
        </label>

        <label class="control hide-focus" title="현재 음성보다 몇 단어 앞을 초록색으로 보여줄지 설정">
          <span>리드</span>
          <input id="leadWords" type="range" min="1" max="8" value="3" />
          <output id="leadValue">3</output>
        </label>

        <label class="control hide-focus">
          <span>언어</span>
          <select id="language">
            <option value="ko-KR" selected>한국어</option>
            <option value="en-US">English</option>
            <option value="ja-JP">日本語</option>
          </select>
        </label>

        <button class="btn icon" id="focusBtn" title="집중 모드">◫</button>
        <button class="btn icon" id="fullscreenBtn" title="전체 화면">⛶</button>
      </div>

      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span class="status-text" id="statusText">준비됨</span>
        <span class="control" style="min-height:28px;padding:0 8px">10 Hz</span>
      </div>
    </header>

    <main class="workspace">
      <aside class="editor-panel">
        <div class="panel-head">
          <div class="panel-title">대본 입력</div>
          <div class="panel-desc">대본을 붙여넣고 ‘대본 적용’을 누르세요.</div>
        </div>
        <div class="editor-wrap">
          <textarea id="scriptInput" spellcheck="false" placeholder="여기에 발표 대본을 붙여넣으세요.

음성 인식 결과는 들어오는 즉시 반영하고, 초록색 읽기 위치는 그 사이에도 0.1초마다 이동합니다."></textarea>
        </div>
        <div class="panel-foot">
          단축키: <b>Space</b> 시작/정지 · <b>←/→</b> 위치 이동 · <b>↑/↓</b> 스크롤 · <b>F</b> 집중 모드<br>
          음성은 이 페이지에 저장하지 않습니다. 브라우저의 음성 인식 기능을 사용합니다.
        </div>
      </aside>

      <section class="prompter-shell">
        <div class="progress"><span id="progressBar"></span></div>
        <div class="guide"></div>
        <div class="prompter" id="prompter">
          <div id="scriptView" class="script">
            <div class="empty-state">
              <div>
                <strong>대본을 먼저 입력하세요</strong>
                왼쪽에 대본을 붙여넣은 뒤 ‘대본 적용’을 누르세요.
              </div>
            </div>
          </div>
        </div>

        <div class="transcript" id="transcriptBox">
          <b>인식 중</b> <span id="transcriptText"></span>
        </div>

        <div class="floating">
          <button class="btn icon" id="backBtn" title="이전 단어">←</button>
          <button class="btn icon" id="nextBtn" title="다음 단어">→</button>
          <button class="btn icon" id="topBtn" title="처음으로">↟</button>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (() => {
      "use strict";

      const $ = (s) => document.querySelector(s);
      const els = {
        scriptInput: $("#scriptInput"),
        scriptView: $("#scriptView"),
        prompter: $("#prompter"),
        startBtn: $("#startBtn"),
        stopBtn: $("#stopBtn"),
        applyBtn: $("#applyBtn"),
        fileBtn: $("#fileBtn"),
        fileInput: $("#fileInput"),
        fontSize: $("#fontSize"),
        sensitivity: $("#sensitivity"),
        leadWords: $("#leadWords"),
        leadValue: $("#leadValue"),
        language: $("#language"),
        focusBtn: $("#focusBtn"),
        fullscreenBtn: $("#fullscreenBtn"),
        statusDot: $("#statusDot"),
        statusText: $("#statusText"),
        progressBar: $("#progressBar"),
        transcriptBox: $("#transcriptBox"),
        transcriptText: $("#transcriptText"),
        backBtn: $("#backBtn"),
        nextBtn: $("#nextBtn"),
        topBtn: $("#topBtn"),
        toast: $("#toast"),
        mobileEditorBtn: $("#mobileEditorBtn")
      };

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      let recognition = null;
      let listening = false;
      let manuallyStopped = false;
      let scriptWords = [];
      let currentIndex = 0;
      let finalTokens = [];
      let recognitionRestartTimer = null;
      let lastScrollAt = 0;

      // 초록색 읽기 위치는 100ms마다 실제로 갱신한다.
      // 음성 인식 결과가 들어오면 정확한 대본 위치로 보정하고,
      // 결과 사이 구간은 마이크 음성 활동과 추정 말하기 속도로 전진한다.
      const TRACK_INTERVAL_MS = 100;
      const DEFAULT_SPEECH_RATE_WPS = 2.35;
      const MAX_PREDICTION_AHEAD_WORDS = 0;

      let trackingTimer = null;
      let latestInterimText = "";
      let pendingFinalTexts = [];
      let latestTranscriptChanged = false;
      let lastProcessedTranscript = "";

      let predictedPosition = 0;
      let speechRateWps = DEFAULT_SPEECH_RATE_WPS;
      let lastTrackingTickAt = 0;
      let lastMatchedAt = 0;
      let lastMatchedIndex = 0;
      let lastRenderedCueIndex = -1;
      let lastSpeechEventAt = 0;

      let voiceActive = false;

      function toast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("show");
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => els.toast.classList.remove("show"), 2200);
      }

      function normalizeToken(token) {
        return String(token || "")
          .toLowerCase()
          .normalize("NFKC")
          .replace(/[^\p{L}\p{N}]+/gu, "");
      }

      function tokenizeSpeech(text) {
        return String(text || "")
          .trim()
          .split(/\s+/)
          .map(normalizeToken)
          .filter(Boolean);
      }

      function bigrams(s) {
        if (!s) return [];
        if (s.length === 1) return [s];
        const out = [];
        for (let i = 0; i < s.length - 1; i++) out.push(s.slice(i, i + 2));
        return out;
      }

      function tokenSimilarity(a, b) {
        if (!a || !b) return 0;
        if (a === b) return 1;
        if (a.length >= 2 && b.length >= 2 && (a.includes(b) || b.includes(a))) {
          return Math.min(a.length, b.length) / Math.max(a.length, b.length) * 0.9;
        }

        const A = bigrams(a);
        const B = bigrams(b);
        const counts = new Map();
        for (const x of A) counts.set(x, (counts.get(x) || 0) + 1);
        let overlap = 0;
        for (const x of B) {
          const n = counts.get(x) || 0;
          if (n > 0) {
            overlap++;
            counts.set(x, n - 1);
          }
        }
        return (2 * overlap) / Math.max(1, A.length + B.length);
      }

      function splitScript(text) {
        const parts = text.match(/\S+|\n+/g) || [];
        const words = [];
        let lineBreaksBefore = 0;

        for (const part of parts) {
          if (/^\n+$/.test(part)) {
            lineBreaksBefore = Math.min(2, part.length);
            continue;
          }
          words.push({
            original: part,
            norm: normalizeToken(part),
            breaks: lineBreaksBefore
          });
          lineBreaksBefore = 0;
        }
        return words.filter(w => w.original);
      }


      function detectScriptLanguage(text) {
        const latin = (text.match(/[A-Za-z]/g) || []).length;
        const hangul = (text.match(/[가-힣]/g) || []).length;
        const japanese = (text.match(/[ぁ-んァ-ン一-龯]/g) || []).length;

        if (latin > hangul * 2 && latin > japanese * 2 && latin >= 20) {
          return "en-US";
        }
        if (japanese > latin && japanese > hangul && japanese >= 10) {
          return "ja-JP";
        }
        return "ko-KR";
      }

      function applyScript() {
        const text = els.scriptInput.value.trim();
        if (!text) {
          toast("대본을 입력해 주세요.");
          return;
        }

        localStorage.setItem("voicecue.script", text);
        scriptWords = splitScript(text);

        const detectedLanguage = detectScriptLanguage(text);
        els.language.value = detectedLanguage;

        currentIndex = 0;
        predictedPosition = 0;
        speechRateWps = DEFAULT_SPEECH_RATE_WPS;
        lastMatchedAt = 0;
        lastMatchedIndex = 0;
        lastRenderedCueIndex = -1;
        finalTokens = [];
        renderScript();
        updateCurrent(0, false);
        document.body.classList.remove("editor-open");
        toast(`${scriptWords.length.toLocaleString()}개 단어를 불러왔습니다.`);
      }

      function renderScript() {
        els.scriptView.innerHTML = "";
        const frag = document.createDocumentFragment();

        scriptWords.forEach((word, index) => {
          if (word.breaks) {
            const br = document.createElement("span");
            br.className = "line-break";
            frag.appendChild(br);
          }

          const span = document.createElement("span");
          span.className = "word";
          span.dataset.index = index;
          span.textContent = word.original;
          frag.appendChild(span);
          frag.appendChild(document.createTextNode(" "));
        });

        els.scriptView.appendChild(frag);
      }

      function getLeadWords() {
        return Math.max(1, Number(els.leadWords?.value || 3));
      }

      function getCuePosition() {
        if (!scriptWords.length) return 0;
        return Math.min(
          scriptWords.length - 1,
          Math.max(0, predictedPosition + getLeadWords())
        );
      }

      function getCueIndex() {
        return Math.min(scriptWords.length - 1, Math.floor(getCuePosition()));
      }

      function renderCue(shouldScroll = true) {
        if (!scriptWords.length) return;

        const cuePosition = getCuePosition();
        const cueIndex = Math.floor(cuePosition);
        const cueFraction = Math.max(0, Math.min(1, cuePosition - cueIndex));
        const all = els.scriptView.querySelectorAll(".word");
        const fadedBefore = Math.max(0, Math.floor(predictedPosition) - 24);

        all.forEach((el, i) => {
          el.classList.toggle("past", i < fadedBefore);
          el.classList.toggle(
            "near",
            i >= Math.floor(currentIndex) && i < cueIndex
          );
          el.classList.toggle("current", i === cueIndex);

          if (i === cueIndex) {
            // 단어 내부의 초록색 채움도 0.1초마다 진행된다.
            el.style.setProperty(
              "--cue-progress",
              `${Math.max(8, Math.round(cueFraction * 100))}%`
            );
          } else {
            el.style.removeProperty("--cue-progress");
          }
        });

        const progress = scriptWords.length <= 1
          ? 0
          : cuePosition / (scriptWords.length - 1);
        els.progressBar.style.width = `${Math.round(progress * 1000) / 10}%`;

        const cueWordChanged = cueIndex !== lastRenderedCueIndex;
        lastRenderedCueIndex = cueIndex;
        if (shouldScroll && cueWordChanged) scrollToCurrent();
      }

      function updateCurrent(index, shouldScroll = true) {
        if (!scriptWords.length) return;

        currentIndex = Math.max(0, Math.min(scriptWords.length - 1, index));
        predictedPosition = currentIndex;
        lastMatchedIndex = currentIndex;
        lastMatchedAt = performance.now();
        renderCue(shouldScroll);
      }

      function applyRecognitionCorrection(index) {
        if (!scriptWords.length) return;

        const matchedIndex = Math.max(
          0,
          Math.min(scriptWords.length - 1, index)
        );

        // 새 음성 인식 결과가 들어왔을 때만 위치를 변경한다.
        currentIndex = matchedIndex;
        predictedPosition = matchedIndex;
        lastMatchedIndex = matchedIndex;
        lastMatchedAt = performance.now();

        renderCue(true);
      }

      function scrollToCurrent() {
        const cueIndex = getCueIndex();
        const target = els.scriptView.querySelector(`.word[data-index="${cueIndex}"]`);
        if (!target) return;

        const now = performance.now();
        const behavior = now - lastScrollAt < 220 ? "auto" : "smooth";
        lastScrollAt = now;

        const parentRect = els.prompter.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();
        const desiredY = parentRect.top + parentRect.height * 0.43;
        const delta = targetRect.top - desiredY;

        els.prompter.scrollTo({
          top: Math.max(0, els.prompter.scrollTop + delta),
          behavior
        });
      }

      function alignSpeech(tokens) {
        if (!scriptWords.length || !tokens.length) return null;

        const speech = tokens.slice(-12);
        const start = Math.max(0, currentIndex - 16);
        const end = Math.min(scriptWords.length, currentIndex + 130);
        const script = scriptWords.slice(start, end);

        const m = speech.length;
        const n = script.length;
        const dp = Array.from({ length: m + 1 }, () => new Float32Array(n + 1));
        const ends = Array.from({ length: m + 1 }, () => new Int32Array(n + 1));

        let bestScore = 0;
        let bestJ = 0;

        for (let i = 1; i <= m; i++) {
          for (let j = 1; j <= n; j++) {
            const sim = tokenSimilarity(speech[i - 1], script[j - 1].norm);
            const matchReward = sim >= 0.84 ? 1.65 : sim >= 0.63 ? 1.1 : sim >= 0.42 ? 0.45 : -0.82;

            const diag = dp[i - 1][j - 1] + matchReward;
            const skipSpeech = dp[i - 1][j] - 0.38;
            const skipScript = dp[i][j - 1] - 0.22;

            let score = 0;
            let endpoint = j;
            if (diag >= skipSpeech && diag >= skipScript && diag > 0) {
              score = diag;
              endpoint = j;
            } else if (skipSpeech >= skipScript && skipSpeech > 0) {
              score = skipSpeech;
              endpoint = ends[i - 1][j] || j;
            } else if (skipScript > 0) {
              score = skipScript;
              endpoint = ends[i][j - 1] || j;
            }

            dp[i][j] = score;
            ends[i][j] = endpoint;

            const absoluteIndex = start + j - 1;
            const backwardPenalty = absoluteIndex < currentIndex ? (currentIndex - absoluteIndex) * 0.018 : 0;
            const forwardPenalty = absoluteIndex > currentIndex + 72 ? (absoluteIndex - currentIndex - 72) * 0.012 : 0;
            const adjusted = score - backwardPenalty - forwardPenalty;

            if (adjusted > bestScore) {
              bestScore = adjusted;
              bestJ = endpoint;
            }
          }
        }

        const confidence = bestScore / Math.max(1.8, Math.min(m, 8) * 1.28);
        return {
          index: Math.max(0, Math.min(scriptWords.length - 1, start + bestJ - 1)),
          confidence
        };
      }

      function processTranscript(text, isFinal, force = false) {
        const tokens = tokenizeSpeech(text);
        if (!tokens.length) return;

        if (isFinal) {
          finalTokens.push(...tokens);
          if (finalTokens.length > 50) finalTokens = finalTokens.slice(-50);
        }

        const combined = [
          ...finalTokens.slice(-14),
          ...(!isFinal ? tokens : [])
        ].slice(-18);

        const signature = combined.join(" ");
        if (!force && signature === lastProcessedTranscript) return;
        lastProcessedTranscript = signature;

        const match = alignSpeech(combined);
        const threshold = Number(els.sensitivity.value) / 100;

        els.transcriptText.textContent = text;
        els.transcriptBox.classList.add("show");

        if (match && match.confidence >= threshold) {
          const maxForwardJump = isFinal ? 16 : 7;
          const bounded = Math.min(match.index, currentIndex + maxForwardJump);
          const next = bounded < currentIndex - 4 ? currentIndex : bounded;
          applyRecognitionCorrection(next);
          setStatus(
            `실시간 0.1초 · 인식 ${Math.round(match.confidence * 100)}%`,
            true
          );
        } else {
          setStatus("0.1초 추적 · 대본 일치 탐색", true);
        }
      }

      function sampleVoiceActivity() {
        // 별도 getUserMedia를 열지 않는다. Web Speech API와 마이크가 충돌하지 않도록
        // 최근 음성 인식 이벤트가 들어온 시간을 음성 활동 기준으로 사용한다.
        voiceActive = performance.now() - lastSpeechEventAt < 900;
        return voiceActive;
      }

      function stopAudioMeter() {
        voiceActive = false;
      }

      function runTrackingTick() {
        if (!listening || !scriptWords.length) return;

        lastTrackingTickAt = performance.now();

        // 화면은 0.1초마다 갱신하지만, 위치는 인식 결과가 올 때만 바뀐다.
        predictedPosition = currentIndex;
        renderCue(false);

        const recentlyRecognized =
          performance.now() - lastSpeechEventAt < 700;

        setStatus(
          recentlyRecognized
            ? "실시간 0.1초 · 음성 반영 중"
            : "실시간 0.1초 · 다음 음성 대기",
          true
        );
      }

      function startTrackingLoop() {
        stopTrackingLoop();
        lastTrackingTickAt = performance.now();
        trackingTimer = setInterval(runTrackingTick, TRACK_INTERVAL_MS);
      }

      function stopTrackingLoop() {
        if (trackingTimer) {
          clearInterval(trackingTimer);
          trackingTimer = null;
        }
      }

      function createRecognition() {
        if (!SpeechRecognition) return null;

        const r = new SpeechRecognition();
        r.continuous = true;
        r.interimResults = true;
        r.maxAlternatives = 1;
        r.lang = els.language.value;

        r.onstart = () => {
          setStatus(`듣는 중 · ${r.lang}`, true);
        };

        r.onresult = (event) => {
          let interim = "";

          for (let i = event.resultIndex; i < event.results.length; i++) {
            const text = event.results[i][0].transcript.trim();
            if (!text) continue;

            if (event.results[i].isFinal) {
              processTranscript(text, true, false);
            } else {
              interim += (interim ? " " : "") + text;
            }
          }

          if (interim) {
            latestInterimText = interim;
            processTranscript(interim, false, false);
          }

          latestTranscriptChanged = true;
          lastSpeechEventAt = performance.now();
        };

        r.onaudiostart = () => {
          setStatus(`마이크 연결됨 · ${r.lang}`, true);
        };

        r.onspeechstart = () => {
          lastSpeechEventAt = performance.now();
          setStatus("음성 인식 중", true);
        };

        r.onspeechend = () => {
          setStatus("음성 처리 중", true);
        };

        r.onerror = (event) => {
          const messages = {
            "not-allowed": "마이크 권한이 차단되었습니다.",
            "service-not-allowed": "브라우저가 음성 인식을 허용하지 않습니다.",
            "audio-capture": "사용 가능한 마이크를 찾지 못했습니다.",
            "network": "음성 인식 서버 연결 오류입니다. HTTPS와 인터넷 연결을 확인하세요.",
            "aborted": "음성 인식이 중단되었습니다.",
            "no-speech": "음성이 감지되지 않았습니다. 마이크 가까이에서 다시 말해보세요."
          };
          const message = messages[event.error] || `음성 인식 오류: ${event.error}`;
          toast(message);
          if (["not-allowed", "service-not-allowed", "audio-capture"].includes(event.error)) {
            listening = false;
            manuallyStopped = true;
            stopTrackingLoop();
            stopAudioMeter();
            updateButtons();
          }
        };

        r.onend = () => {
          if (listening && !manuallyStopped) {
            clearTimeout(recognitionRestartTimer);
            recognitionRestartTimer = setTimeout(() => {
              try {
                recognition = createRecognition();
                recognition?.start();
              } catch (_) {}
            }, 280);
          } else {
            setStatus("정지됨", false);
          }
        };

        return r;
      }

      function startListening() {
        if (!scriptWords.length) {
          applyScript();
          if (!scriptWords.length) return;
        }

        if (!SpeechRecognition) {
          toast("이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 또는 Edge를 사용해 주세요.");
          return;
        }

        manuallyStopped = false;
        listening = true;
        finalTokens = [];
        pendingFinalTexts = [];
        latestInterimText = "";
        latestTranscriptChanged = false;
        lastProcessedTranscript = "";
        predictedPosition = currentIndex;
        speechRateWps = DEFAULT_SPEECH_RATE_WPS;
        lastMatchedAt = performance.now();
        lastMatchedIndex = currentIndex;
        lastSpeechEventAt = 0;

        recognition = createRecognition();

        try {
          // 사용자 클릭 이벤트 안에서 즉시 시작해야 브라우저가 마이크 권한을 허용한다.
          recognition.start();
          startTrackingLoop();
          updateButtons();
        } catch (error) {
          listening = false;
          stopTrackingLoop();
          stopAudioMeter();
          updateButtons();
          toast("음성 인식을 시작하지 못했습니다.");
        }
      }

      function stopListening() {
        manuallyStopped = true;
        listening = false;
        clearTimeout(recognitionRestartTimer);
        stopTrackingLoop();
        stopAudioMeter();
        try { recognition?.stop(); } catch (_) {}
        recognition = null;
        latestInterimText = "";
        pendingFinalTexts = [];
        latestTranscriptChanged = false;
        updateButtons();
        els.transcriptBox.classList.remove("show");
        setStatus("정지됨", false);
      }

      function updateButtons() {
        els.startBtn.hidden = listening;
        els.stopBtn.hidden = !listening;
      }

      function setStatus(text, live) {
        els.statusText.textContent = text;
        els.statusDot.classList.toggle("live", !!live);
      }

      function loadFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          els.scriptInput.value = String(reader.result || "");
          applyScript();
        };
        reader.onerror = () => toast("파일을 읽지 못했습니다.");
        reader.readAsText(file);
      }

      function toggleFocusMode() {
        document.body.classList.toggle("focus-mode");
        setTimeout(scrollToCurrent, 120);
      }

      async function toggleFullscreen() {
        try {
          if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
          else await document.exitFullscreen();
        } catch (_) {
          toast("전체 화면을 사용할 수 없습니다.");
        }
      }

      function init() {
        if (!window.isSecureContext && location.protocol !== "file:") {
          toast("마이크 인식을 위해 HTTPS 또는 localhost로 실행해 주세요.");
        }

        const saved = localStorage.getItem("voicecue.script");
        if (saved) {
          els.scriptInput.value = saved;
          applyScript();
        }

        const savedFont = localStorage.getItem("voicecue.fontSize");
        if (savedFont) {
          els.fontSize.value = savedFont;
          document.documentElement.style.setProperty("--font-size", `${savedFont}px`);
        }

        const savedLead = localStorage.getItem("voicecue.leadWords");
        if (savedLead) els.leadWords.value = savedLead;
        els.leadValue.value = els.leadWords.value;

        els.applyBtn.addEventListener("click", applyScript);
        els.startBtn.addEventListener("click", startListening);
        els.stopBtn.addEventListener("click", stopListening);
        els.fileBtn.addEventListener("click", () => els.fileInput.click());
        els.fileInput.addEventListener("change", (e) => loadFile(e.target.files?.[0]));
        els.focusBtn.addEventListener("click", toggleFocusMode);
        els.fullscreenBtn.addEventListener("click", toggleFullscreen);
        els.mobileEditorBtn.addEventListener("click", () => document.body.classList.toggle("editor-open"));

        els.fontSize.addEventListener("input", () => {
          document.documentElement.style.setProperty("--font-size", `${els.fontSize.value}px`);
          localStorage.setItem("voicecue.fontSize", els.fontSize.value);
          scrollToCurrent();
        });

        els.leadWords.addEventListener("input", () => {
          els.leadValue.value = els.leadWords.value;
          localStorage.setItem("voicecue.leadWords", els.leadWords.value);
          updateCurrent(currentIndex, true);
          setStatus(`${els.leadWords.value}단어 앞서 표시`, listening);
        });

        els.language.addEventListener("change", () => {
          if (listening) {
            stopListening();
            setTimeout(startListening, 150);
          }
        });

        els.backBtn.addEventListener("click", () => updateCurrent(currentIndex - 1));
        els.nextBtn.addEventListener("click", () => updateCurrent(currentIndex + 1));
        els.topBtn.addEventListener("click", () => updateCurrent(0));

        document.addEventListener("keydown", (e) => {
          const typing = /textarea|input|select/i.test(document.activeElement?.tagName || "");
          if (typing && e.code !== "Escape") return;

          if (e.code === "Space") {
            e.preventDefault();
            listening ? stopListening() : startListening();
          } else if (e.key === "ArrowLeft") {
            e.preventDefault();
            updateCurrent(currentIndex - 1);
          } else if (e.key === "ArrowRight") {
            e.preventDefault();
            updateCurrent(currentIndex + 1);
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            els.prompter.scrollBy({ top: -120, behavior: "smooth" });
          } else if (e.key === "ArrowDown") {
            e.preventDefault();
            els.prompter.scrollBy({ top: 120, behavior: "smooth" });
          } else if (e.key.toLowerCase() === "f") {
            e.preventDefault();
            toggleFocusMode();
          } else if (e.code === "Escape") {
            document.body.classList.remove("editor-open");
          }
        });

        window.addEventListener("beforeunload", stopListening);
        updateButtons();
      }

      init();
    })();
  </script>
</body>
</html>
